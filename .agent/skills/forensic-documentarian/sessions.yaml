# Forensic Documentarian — Session Configuration
# ------------------------------------------------
# Use {slug} as a placeholder for the industry slug (e.g. "ai_for_global_finance").
# proof_heading: the exact markdown heading above the ```text proof block to update.
# regex: optional explicit regex — if omitted, a heading-based pattern is auto-built.
# All paths are relative to the dist/{slug}/ build directory when TARGET_INDUSTRY is set.

sessions:
