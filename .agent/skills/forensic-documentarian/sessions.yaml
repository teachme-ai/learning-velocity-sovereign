    name: "Session 01: Data Pipeline Automation"
    script: ["python3", "dist/{slug}/01_data_pipeline_automation/set_{slug}/logic/cleaner.py"]
    markdown: "dist/{slug}/01_data_pipeline_automation/01_data_pipeline_automation.md"
    output_dir: "dist/{slug}/assets/proof/session_01"
